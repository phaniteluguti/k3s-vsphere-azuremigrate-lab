---
- name: Install k3s server
  ansible.builtin.shell:
    cmd: >
      curl -sfL https://get.k3s.io |
      INSTALL_K3S_CHANNEL={{ k3s_channel }}
      sh -s - server --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s

- name: Wait for node-token to be generated
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Read node-token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token

- name: Set join facts for agents
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_node_token.content | b64decode | trim }}"
    k3s_url: "https://{{ ansible_default_ipv4.address }}:6443"

- name: Share join facts with all hosts
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token }}"
    k3s_url: "{{ k3s_url }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['k3s_agents'] | default([]) }}"

- name: Fetch kubeconfig to the control machine
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ playbook_dir }}/../kubeconfig"
    flat: true

- name: Point fetched kubeconfig at the server IP
  ansible.builtin.replace:
    path: "{{ playbook_dir }}/../kubeconfig"
    regexp: '127\.0\.0\.1'
    replace: "{{ ansible_default_ipv4.address }}"
  delegate_to: localhost
  become: false
